<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL Career Guess</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles (order matters: variables → base → components → modal → animations) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

<!-- Overlay oscuro sobre la imagen de fondo -->
<div class="bg-overlay"></div>

<!-- Canvas de partículas flotantes (z-index 0, igual que /dle) -->
<canvas id="canvas-particles" style="position:fixed;inset:0;pointer-events:none;z-index:1"></canvas>

<!-- Canvas de confetti de victoria (z-index alto, encima del modal) -->
<canvas id="canvas-confetti"  style="position:fixed;inset:0;pointer-events:none;z-index:201"></canvas>

<div class="app">

  <!-- ── HEADER — banner dorado estilo DLE ──────────── -->
  <header>
    <div class="header-banner">
      <!-- línea superior decorativa -->
      <div class="header-deco">
        <div class="header-deco-line left"></div>
        <span class="header-deco-star">✦</span>
        <div class="header-deco-line right"></div>
      </div>

      <!-- título principal -->
      <div class="header-title">LoL Career Guess</div>

      <!-- separador central con rombos -->
      <div class="header-sep">
        <div class="header-sep-line left"></div>
        <span class="header-sep-diamonds">◆ ◆ ◆</span>
        <div class="header-sep-line right"></div>
      </div>

      <!-- subtítulo -->
      <div class="header-subtitle">Adivina al jugador por su trayectoria</div>

      <!-- línea inferior decorativa -->
      <div class="header-deco">
        <div class="header-deco-line left"></div>
        <span class="header-deco-star">✦</span>
        <div class="header-deco-line right"></div>
      </div>
    </div>
  </header>

  <!-- ── STATS ──────────────────────────────────────── -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-wins">0</div>
      <div class="stat-label">Victorias</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-played">0</div>
      <div class="stat-label">Jugados</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-streak">0</div>
      <div class="stat-label">Racha</div>
    </div>
  </div>

  <!-- ── PROGRESS DOTS ──────────────────────────────── -->
  <div class="progress-dots" id="progress-dots"></div>

  <!-- ── CAREER TIMELINE ────────────────────────────── -->
  <div class="timeline-card">
    <div class="timeline-title">Trayectoria Revelada</div>
    <div class="timeline" id="timeline"></div>
  </div>

  <hr class="divider">

  <!-- ── INPUT & ACTIONS ────────────────────────────── -->
  <div class="input-section">
    <div class="input-row">
      <div class="input-wrapper">
        <input
          type="text"
          class="guess-input"
          id="guess-input"
          placeholder="Escribe el nombre del jugador…"
          autocomplete="off"
          spellcheck="false"
        >
        <div class="autocomplete-list" id="autocomplete-list"></div>
      </div>
      <button class="btn btn-submit" id="btn-submit">⚔ Adivinar</button>
    </div>
    <div class="action-buttons">
      <button class="btn btn-hint" id="btn-hint">💡 Pista (-1 intento)</button>
      <button class="btn btn-skip" id="btn-skip">✕ Saltar</button>
    </div>
  </div>

  <!-- ── NEXT ROUND BUTTON (visible after round ends) ─ -->
  <button class="btn btn-next" id="btn-next">▶ Siguiente Jugador</button>

  <!-- ── HINTS LOG ──────────────────────────────────── -->
  <div class="hints-log" id="hints-log"></div>

</div>

<!-- ── RESULT MODAL ─────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-icon"     id="modal-icon"></div>
    <div class="modal-title"    id="modal-title"></div>
    <div class="modal-player"   id="modal-player"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-wins">0</div>
        <div class="modal-stat-lbl">Victorias</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-played">0</div>
        <div class="modal-stat-lbl">Jugados</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-streak">0</div>
        <div class="modal-stat-lbl">Racha</div>
      </div>
    </div>
    <button class="modal-btn" id="modal-btn">▶ Siguiente Jugador</button>
  </div>
</div>

<!-- ES Module entry point -->
<script type="module" src="js/main.js"></script>

</body>
</html>
