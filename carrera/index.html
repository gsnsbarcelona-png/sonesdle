<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoL Career Guess · LOL Pro Games</title>

  <!-- SEO -->
  <meta name="description" content="Adivina al pro player por su trayectoria profesional. La carrera se revela paso a paso: equipos, años y ligas. ¿Cuántos pasos necesitas?">
  <meta name="keywords" content="lol, league of legends, pro player, carrera, timeline, esports, adivina, lolprogames">
  <meta name="author" content="LOL Pro Games">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://lolprogames.com/carrera/">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://lolprogames.com/carrera/">
  <meta property="og:title"       content="LoL Career Guess · LOL Pro Games">
  <meta property="og:description" content="Adivina al pro player por su historial de equipos y años. Timeline progresivo.">
  <meta property="og:image"       content="https://lolprogames.com/og-image.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="LoL Career Guess · LOL Pro Games">
  <meta name="twitter:description" content="Adivina al pro player por su trayectoria profesional.">
  <meta name="twitter:image"       content="https://lolprogames.com/og-image.jpg">

  <!-- PWA / App -->
  <meta name="theme-color" content="#010a13">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LOL Pro Games">
  <link rel="manifest" href="../manifest.json">

  <!-- Favicon (raíz global) -->
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="icon" type="image/png"     href="../favicon.png" sizes="32x32">
  <link rel="apple-touch-icon"          href="../apple-touch-icon.png">

  <!-- Preload fondo -->
  <link rel="preload" href="../fondo1.jpg" as="image">

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://flagcdn.com">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles (order matters: variables → base → components → modal → animations) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

<!-- Overlay oscuro sobre la imagen de fondo -->
<div class="bg-overlay"></div>

<!-- Canvas de partículas flotantes (z-index 0, igual que /dle) -->
<canvas id="canvas-particles" style="position:fixed;inset:0;pointer-events:none;z-index:1"></canvas>

<!-- Canvas de confetti de victoria (z-index alto, encima del modal) -->
<canvas id="canvas-confetti"  style="position:fixed;inset:0;pointer-events:none;z-index:201"></canvas>

<div class="app">

  <!-- ── HEADER — banner dorado estilo DLE ──────────── -->
  <header>
    <div class="header-banner">
      <!-- línea superior decorativa -->
      <div class="header-deco">
        <div class="header-deco-line left"></div>
        <span class="header-deco-star">✦</span>
        <div class="header-deco-line right"></div>
      </div>

      <!-- título principal -->
      <div class="header-title">LoL Career Guess</div>

      <!-- separador central con rombos -->
      <div class="header-sep">
        <div class="header-sep-line left"></div>
        <span class="header-sep-diamonds">◆ ◆ ◆</span>
        <div class="header-sep-line right"></div>
      </div>

      <!-- subtítulo -->
      <div class="header-subtitle" data-i18n="subtitle">Adivina al jugador por su trayectoria</div>

      <!-- línea inferior decorativa -->
      <div class="header-deco">
        <div class="header-deco-line left"></div>
        <span class="header-deco-star">✦</span>
        <div class="header-deco-line right"></div>
      </div>
    </div>
  </header>

  <!-- ── STATS ──────────────────────────────────────── -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-wins">0</div>
      <div class="stat-label" data-i18n="wins">Victorias</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-played">0</div>
      <div class="stat-label" data-i18n="played">Jugados</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-streak">0</div>
      <div class="stat-label" data-i18n="streak">Racha</div>
    </div>
  </div>

  <!-- ── LIVES BOX (dots + rendirse) ───────────────── -->
  <div class="lives-box">
    <span class="lives-label" data-i18n="attempts">⚡ Intentos</span>
    <div class="progress-dots" id="progress-dots"></div>
  </div>

  <!-- ── CAREER TIMELINE ────────────────────────────── -->
  <div class="timeline-card">
    <div class="timeline-title">
      <span data-i18n="pathTitle">Trayectoria Revelada</span>
      <span class="position-badge hidden" id="position-badge"></span>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <hr class="divider">

  <!-- ── INPUT & ACTIONS ────────────────────────────── -->
  <div class="input-section">
    <div class="input-row">
      <div class="input-wrapper">
        <input
          type="text"
          class="guess-input"
          id="guess-input"
          data-i18n-ph="placeholder" placeholder="Escribe el nombre del jugador…"
          autocomplete="off"
          spellcheck="false"
        >
        <div class="autocomplete-list" id="autocomplete-list"></div>
      </div>
      <button class="btn btn-submit" id="btn-submit" data-i18n="btnGuess">⚔ Adivinar</button>
      <button class="btn btn-hint"   id="btn-hint"   data-i18n="btnHint">💡 Pista</button>
      <button class="btn btn-skip hidden" id="btn-skip" data-i18n="btnSkip">⚑ Rendirse</button>
    </div>
  </div>

  <!-- ── NEXT ROUND BUTTON (visible after round ends) ─ -->
  <button class="btn btn-next" id="btn-next" data-i18n="btnNext">▶ Siguiente Jugador</button>

  <!-- ── HINTS LOG ──────────────────────────────────── -->
  <div class="hints-log" id="hints-log"></div>

</div>

<!-- ── RESULT MODAL ─────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-icon"     id="modal-icon"></div>
    <div class="modal-title"    id="modal-title"></div>
    <div class="modal-player"   id="modal-player"></div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-wins">0</div>
        <div class="modal-stat-lbl" data-i18n="modalWins">Victorias</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-played">0</div>
        <div class="modal-stat-lbl" data-i18n="modalPlayed">Jugados</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="modal-streak">0</div>
        <div class="modal-stat-lbl" data-i18n="modalStreak">Racha</div>
      </div>
    </div>
    <button class="modal-btn" id="modal-btn" data-i18n="modalBtn">▶ Siguiente Jugador</button>
  </div>
</div>

<!-- ES Module entry point -->
<script type="module" src="js/main.js"></script>

</body>
</html>
