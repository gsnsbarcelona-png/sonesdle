<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoL Pro Grid · LOL Pro Games</title>

<!-- SEO -->
<meta name="description" content="Rellena la cuadrícula 3×3 con pro players de LoL. Encuentra el jugador que cumple dos criterios a la vez. Vidas limitadas.">
<meta name="keywords" content="lol, league of legends, pro player, grid, esports, adivina, lolprogames">
<meta name="author" content="LOL Pro Games">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://lolprogames.com/grid/">

<!-- Open Graph -->
<meta property="og:type"        content="website">
<meta property="og:url"         content="https://lolprogames.com/grid/">
<meta property="og:title"       content="LoL Pro Grid · LOL Pro Games">
<meta property="og:description" content="Cuadrícula 3×3 con pro players de LoL. Combina equipo, posición, liga y más.">
<meta property="og:image"       content="https://lolprogames.com/og-image.jpg">

<!-- Twitter Card -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="LoL Pro Grid · LOL Pro Games">
<meta name="twitter:description" content="Cuadrícula 3×3 con pro players de LoL.">
<meta name="twitter:image"       content="https://lolprogames.com/og-image.jpg">

<!-- PWA / App -->
<meta name="theme-color" content="#010a13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LOL Pro Games">
<link rel="manifest" href="../manifest.json">

<!-- Favicon (raíz global) -->
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="icon" type="image/png"     href="../favicon.png" sizes="32x32">
<link rel="apple-touch-icon"          href="../apple-touch-icon.png">

<!-- Preconnect -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Preload fondo -->
<link rel="preload" href="../fondo1.jpg" as="image">

<!-- Shared CSS variables (LOLPROGAMES global) -->
<link rel="stylesheet" href="../shared/css/variables.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>

<main class="page">
  <header class="header">
    <div class="header-title-row">
      <div class="header-line"></div>
      <h1>LoL Pro Grid</h1>
      <div class="header-line"></div>
    </div>
    <p class="header-sub" data-i18n="headerSub">Completa las 9 casillas · Pro Players</p>
  </header>

  <div class="lives-row" id="livesRow">
    <span class="lives-label">Vidas</span>
  </div>

  <div class="grid-outer">
    <div class="grid-wrap" id="grid"></div>
  </div>

  <div class="progress-row" id="progressRow">
    <span class="progress-label">Celdas</span>
  </div>
</main>

<!-- Modal -->
<div class="overlay" id="modalOverlay" style="display:none">
  <div class="modal-card">
    <div class="modal-body">
      <div class="cell-context">
        <span class="cell-context-icons" id="modalIcons">🎯×🇰🇷</span>
        <span class="cell-context-text" id="modalDesc"></span>
      </div>
      <div class="input-wrap">
        <input class="modal-input" id="playerInput" type="text"
               data-i18n-ph="placeholder" placeholder="Nombre del pro player…" autocomplete="off" spellcheck="false">
        <div class="ac-list" id="acList"></div>
      </div>
      <p class="error-msg" id="errorMsg"></p>
      <div class="btn-row">
        <button class="btn btn-confirm" id="btnConfirm" data-i18n="confirm">Confirmar</button>
        <button class="btn btn-cancel"  id="btnCancel"  data-i18n="cancel">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- Victory -->
<div class="end-overlay" id="victoryOverlay" style="display:none">
  <div class="end-card">
    <div class="end-body">
      <span class="end-icon victory-icon">🏆</span>
      <p class="end-title"   data-i18n="victory">¡Victoria!</p>
      <p class="end-sub teal" data-i18n="victorySub">Todas las casillas completadas</p>
      <button class="btn-replay" id="btnVictoryReplay"  data-i18n="playAgain">Jugar de nuevo</button>
    </div>
  </div>
</div>

<!-- Game Over -->
<div class="end-overlay" id="gameoverOverlay" style="display:none">
  <div class="end-card">
    <div class="end-body">
      <span class="end-icon gameover-icon">💀</span>
      <p class="end-title"  data-i18n="gameOver">Game Over</p>
      <p class="end-sub red" data-i18n="gameOverSub">Se acabaron las vidas</p>
      <button class="btn-replay" id="btnGameoverReplay" data-i18n="tryAgain">Intentar de nuevo</button>
    </div>
  </div>
</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
