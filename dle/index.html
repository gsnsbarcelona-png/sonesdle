  <style>
    /* ── Grid layout ────────────────────────────────────────── */
    .game-grid {
      display: grid;
      grid-template-columns: 68px repeat(7, 1fr);
      gap: 2px;
    }
    @media (min-width: 400px) {
      .game-grid { grid-template-columns: 80px repeat(7, 1fr); gap: 3px; }
    }
    @media (min-width: 540px) {
      .game-grid { grid-template-columns: 100px repeat(7, 1fr); }
    }
    @media (min-width: 768px) {
      .game-grid { grid-template-columns: 130px repeat(7, 1fr); gap: 4px; }
    }

    /* ── Encabezados de columna ─────────────────────────────── */
    .col-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5px 1px;
      color: #4a6080;
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      gap: 2px;
      border-radius: 4px 4px 0 0;
    }
    .col-icon { font-size: 0.85rem; }
    @media (min-width: 400px) {
      .col-header { font-size: 0.54rem; padding: 5px 2px; }
      .col-icon   { font-size: 0.95rem; }
    }
    @media (min-width: 540px) {
      .col-header { font-size: 0.6rem; }
      .col-icon   { font-size: 1.05rem; }
    }
    @media (min-width: 768px) {
      .col-header { font-size: 0.65rem; letter-spacing: 1.5px; padding: 6px 4px; }
      .col-icon   { font-size: 1.1rem; }
    }

    /* ── Celdas base ────────────────────────────────────────── */
    .cell {
      height: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3px 2px;
      border: 1px solid #1e3a5f;
      background: #0a1428;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      border-radius: 4px;
      /* estado inicial para la animacion */
      opacity: 0;
      transform: rotateY(90deg);
    }
    @media (min-width: 400px) {
      .cell { height: 54px; font-size: 0.68rem; padding: 3px; }
    }
    @media (min-width: 540px) {
      .cell { height: 58px; font-size: 0.72rem; }
    }
    @media (min-width: 768px) {
      .cell { height: 66px; font-size: 0.8rem; padding: 4px 5px; border-radius: 6px; }
    }

    /* Celda de nombre (visible desde el principio, sin animacion) */
    .cell-name {
      border-color: #785a28;
      background: #0f1e36;
      color: #f0e6d3;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      border-radius: 4px;
      opacity: 1;
      transform: none;
    }
    @media (min-width: 540px)  { .cell-name { font-size: 0.78rem; } }
    @media (min-width: 768px)  { .cell-name { font-size: 0.9rem; letter-spacing: 0.5px; border-radius: 6px; } }

    /* Estados de celda */
    .cell-correct { background: #0d3a1e; border-color: #00cc66; color: #a0ffcc; }
    .cell-partial { background: #3a1f00; border-color: #cc6e00; color: #ffcc88; }
    .cell-wrong   { background: #3a0d0d; border-color: #cc2222; color: #ffaaaa; }

    /* Animacion flip reveal */
    .cell-revealed {
      animation: flipReveal 0.38s ease forwards;
    }
    @keyframes flipReveal {
      from { opacity: 0; transform: rotateY(90deg); }
      to   { opacity: 1; transform: rotateY(0deg);  }
    }

    /* Contenido de celda */
    .cell-flag  { font-size: 1rem;  margin-bottom: 1px; }
    .cell-text  { font-size: 0.6rem; line-height: 1.2; }
    .cell-main  { font-size: 0.75rem; font-weight: 700; }
    .cell-arrow { font-size: 0.85rem; margin-top: 1px; }
    @media (min-width: 540px) {
      .cell-flag  { font-size: 1.1rem; }
      .cell-text  { font-size: 0.64rem; }
      .cell-main  { font-size: 0.8rem; }
    }
    @media (min-width: 768px) {
      .cell-flag  { font-size: 1.2rem; margin-bottom: 2px; }
      .cell-text  { font-size: 0.68rem; line-height: 1.25; }
      .cell-main  { font-size: 0.86rem; }
      .cell-arrow { font-size: 0.95rem; }
    }

    /* ── Dropdown ───────────────────────────────────────────── */
    .dd-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      border-bottom: 1px solid rgba(30,58,95,0.4);
      transition: background 0.12s;
    }
    @media (min-width: 540px) {
      .dd-item { gap: 10px; padding: 9px 14px; font-size: 0.92rem; }
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover,
    .dd-item.dd-active  { background: rgba(200,155,60,0.1); color: #c89b3c; }
    .dd-flag { font-size: 1.1rem; }
    .dd-name { flex: 1; }
    .dd-pos  { font-size: 0.65rem; color: #4a6080; letter-spacing: 1px; }

    /* ── Victory overlay animation ──────────────────────────── */
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1);    }
    }
    .victory-card { animation: cardIn 0.45s ease; }

    /* ── Tooltips de columna ────────────────────────────────── */
    .col-tip { position: relative; }
    .col-tip::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #0a1428;
      border: 1px solid #785a28;
      color: #c8d4e8;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      padding: 5px 9px;
      white-space: nowrap;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .col-tip::before {
      content: '';
      position: absolute;
      top: calc(100% + 1px);
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-bottom-color: #785a28;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 201;
      pointer-events: none;
    }
    .col-tip:hover::after,
    .col-tip:hover::before { opacity: 1; }

    /* ── Scrollbar ──────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 5px; }
    ::-webkit-scrollbar-track { background: #010a13; }
    ::-webkit-scrollbar-thumb { background: #785a28; border-radius: 3px; }
  </style>
</head>

<body class="text-lol-text font-rajdhani min-h-screen p-2 sm:p-3 md:p-5"

      </button>
      <button data-lang="en" class="lang-option flex items-center gap-2 px-3 py-2 w-full text-left

  <!-- ══ CONTENIDO PRINCIPAL ══════════════════════════════════ -->
  <div class="relative z-10 max-w-5xl mx-auto">

    <!-- HEADER — Banner horizontal -->

      <div class="inline-block w-full max-w-2xl mx-auto px-4"

        <!-- Subtítulo -->

        <!-- Línea inferior decorativa -->
        <div class="flex items-center gap-3 mt-2">

    </header>

    <!-- Badge modo + banner modo libre -->

    <!-- BUSQUEDA -->
    <div class="mb-4">
